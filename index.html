<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYSE Tracker | Real-Time Stock Signal Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --surface: #111118;
            --surface2: #16161f;
            --border: #1e1e2e;
            --accent: #e8ff47;
            --text-primary: #e8e8f0;
            --muted: #6b6b80;
            --green: #39ff8f;
            --yellow: #ffd166;
            --red: #ff4757;
            --gray: #3a3a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(160deg, #050808 0%, #0a0f1f 100%);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.15s;
        }

        a:hover {
            color: #fff;
        }

        header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 8, 8, 0.8);
            backdrop-filter: blur(10px);
        }

        header .container {
            max-width: 920px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--text-primary);
        }

        header nav a {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            margin-left: 24px;
            color: var(--muted);
        }

        header nav a:hover {
            color: var(--accent);
        }

        main {
            flex: 1;
            max-width: 920px;
            margin: 0 auto;
            width: 100%;
            padding: 32px 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero h2 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(28px, 5vw, 52px);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .hero .highlight {
            background: linear-gradient(90deg, var(--accent), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 15px;
            color: var(--muted);
            max-width: 560px;
            margin: 0 auto 32px;
            line-height: 1.7;
        }

        .cta-button {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 12px 32px;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
